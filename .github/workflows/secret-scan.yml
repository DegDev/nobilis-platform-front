name: secret-scan

# Required check before merge to dev: no key/secret/token value may land in the repo.
# Mirrors the local pre-commit gate (.githooks/pre-commit) so the same config blocks both.
on:
  push:
    branches: [main, dev]
  pull_request:

# Least privilege: scanning only needs to read the checkout.
permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan repository for secrets
        run: gitleaks dir . --config .gitleaks.toml --redact --no-banner --verbose
