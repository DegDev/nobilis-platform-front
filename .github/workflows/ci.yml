name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (common, admin, app)
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test (admin, app, common)
        run: npm run test:ci

      - name: Check formatting
        run: npm run format:check
